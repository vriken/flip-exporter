plugins {
	id 'java'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
		content {
			includeGroupByRegex("net\\.runelite.*")
		}
	}
	mavenCentral()
}

def runeLiteVersion = 'latest.release'
def pluginMainClass = 'dev.flipexporter.FlipExporterTest'

dependencies {
	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.30'
	annotationProcessor 'org.projectlombok:lombok:1.18.30'

	testImplementation 'junit:junit:4.12'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'dev.flipexporter'
version = '0.2.0'

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
	options.release.set(11)
}

// `./gradlew run` launches RuneLite (developer mode) with this plugin sideloaded for testing.
// The --add-exports opens the Apple fullscreen class RuneLite's macOS UI needs on JDK 9+ (without it
// you get "IllegalAccessError: ... com.apple.eawt ... not exported"). Harmless on other platforms.
tasks.register('run', JavaExec) {
	classpath = sourceSets.test.runtimeClasspath
	mainClass = pluginMainClass

	jvmArgs "-ea",
			"--add-exports", "java.desktop/com.apple.eawt=ALL-UNNAMED",
			"--add-opens", "java.desktop/com.apple.eawt=ALL-UNNAMED",
			"--add-opens", "java.base/java.lang.reflect=ALL-UNNAMED",
			"--add-opens", "java.base/java.net=ALL-UNNAMED",
			"--add-opens", "java.base/java.io=ALL-UNNAMED"
	args "--developer-mode", "--debug"
}

// `./gradlew jar` builds a THIN plugin jar (just the plugin + manifest, no bundled client/deps) to
// drop into ~/.runelite/sideloaded-plugins/ and load in your normal RuneLite. Use this for daily use.
jar {
	from('.') { include 'runelite-plugin.properties' }
}

// `./gradlew shadowJar` builds the sideloadable plugin jar (drop into ~/.runelite/sideloaded-plugins).
tasks.register('shadowJar', Jar) {
	dependsOn configurations.testRuntimeClasspath
	manifest {
		attributes('Main-Class': pluginMainClass, 'Multi-Release': true)
	}

	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from sourceSets.main.output
	from sourceSets.test.output
	from('.') { include 'runelite-plugin.properties' }   // manifest, so the jar can be sideloaded
	from {
		configurations.testRuntimeClasspath.collect { file ->
			file.isDirectory() ? file : zipTree(file)
		}
	}

	exclude 'META-INF/INDEX.LIST'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
	exclude '**/module-info.class'

	group = BasePlugin.BUILD_GROUP
	archiveClassifier.set('shadow')
	archiveFileName.set("${rootProject.name}-${project.version}-all.jar")
}
